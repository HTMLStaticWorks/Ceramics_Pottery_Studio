<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Ceramics &amp; Pottery Studio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-page__bg">
        <img src="image/WhatsApp Image 2026-04-11 at 12.03.58 AM.jpeg" alt="" width="1600" height="1000" />
      </div>
      <div class="auth-page__overlay" aria-hidden="true"></div>
      <div class="auth-card">
        <div class="auth-card__logo">
          <a href="index.html" class="logo" style="justify-content: center">
            <span class="logo__mark" aria-hidden="true">⌘</span>
            Clay &amp; Kiln
          </a>
        </div>
        <form action="dashboard.html" method="get">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field field--password">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="toggle-pass" data-toggle-password aria-controls="password" aria-label="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
          </div>
          <div class="auth-row">
            <label style="display: flex; align-items: center; gap: 0.35rem; cursor: pointer">
              <input type="checkbox" name="remember" />
              Remember me
            </label>
            <a href="#">Forgot password</a>
          </div>
          <button type="submit" class="btn btn--primary btn--block">Login</button>
        </form>
        <div class="auth-divider">or continue with</div>
        <div class="social-btns">
          <button type="button" class="btn btn--block">Google</button>
          <button type="button" class="btn btn--block">Apple</button>
        </div>
        <p class="auth-footer">Don't have an account? <a href="register.html">Sign Up</a></p>
      </div>
    </div>

    <div style="position: fixed; bottom: 1rem; right: 1rem; z-index: 10; display: flex; gap: 0.5rem">
      <button type="button" class="icon-btn" data-rtl-toggle aria-label="Toggle RTL">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 016-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25v13.5m8.5-13.5v13.5" /></svg>
      </button>
      <button type="button" class="icon-btn" data-theme-toggle aria-label="Toggle dark mode">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
      </button>
    </div>
    <script src="js/main.js" defer></script>
  </body>
</html>
